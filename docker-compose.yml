version: "3.9"

services:

  db:
    image: mariadb:10.6
    container_name: fresaa-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: fresaaroot
      MYSQL_DATABASE: fresaa
    volumes:
      - fresaa_db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3316:3306"

  backend:
    build: ./backend
    container_name: fresaa-backend
    restart: always
    depends_on:
      - db
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    container_name: fresaa-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  fresaa_db_data:
